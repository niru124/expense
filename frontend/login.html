<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h1 class="text-3xl font-bold mb-6 text-center text-indigo-600">Login</h1>
        
        <form id="loginForm" class="space-y-4">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
                <input type="text" id="username" name="username" class="mt-1 block w-full p-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500" required>
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="password" name="password" class="mt-1 block w-full p-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500" required>
            </div>
            <div id="errorMessage" class="text-red-600 text-sm hidden"></div>
            <button type="submit" class="w-full bg-indigo-600 text-white p-2 rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">Login</button>
        </form>
        
        <p class="mt-4 text-center text-gray-600">
            Don't have an account? 
            <a href="http://localhost:8088/register.html" class="text-indigo-600 hover:underline">Register here</a>
        </p>
        
        <p class="mt-2 text-center">
            <a href="http://localhost:8088/" class="text-gray-500 hover:underline">Back to Home</a>
        </p>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5000';

        document.getElementById('loginForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            
            errorMessage.classList.add('hidden');
            
            try {
                const response = await fetch(`${API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify({ username, password }),
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    errorMessage.textContent = error.error || 'Login failed';
                    errorMessage.classList.remove('hidden');
                    return;
                }
                
        // Login successful - redirect to main app
                window.location.href = 'http://localhost:8088/index.html';
            } catch (error) {
                console.error('Error:', error);
                errorMessage.textContent = 'Unable to connect to server. Make sure the backend is running.';
                errorMessage.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
